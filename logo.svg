<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Linear Gradients for premium look -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C78B" />
      <stop offset="50%" stop-color="#D4AF77" />
      <stop offset="100%" stop-color="#B28955" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#008000" />
      <stop offset="100%" stop-color="#004d00" />
    </linearGradient>
    <!-- Drop Shadow for 3D effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background (Optional, for preview contrast if needed, setting to transparent) -->
  <rect width="400" height="150" fill="transparent"/>

  <!-- Icon Group: Stylized Rice Sheaf -->
  <g transform="translate(30, 20)" filter="url(#dropShadow)">
    <!-- Base leaf Left -->
    <path d="M 45 95 C 20 80, 10 50, 35 25 C 25 45, 30 75, 45 95 Z" fill="url(#greenGradient)"/>
    <!-- Base leaf Right -->
    <path d="M 55 95 C 80 80, 90 50, 65 25 C 75 45, 70 75, 55 95 Z" fill="url(#greenGradient)"/>
    
    <!-- Left Rice Grains -->
    <path d="M 42 75 C 25 65, 20 50, 38 45 C 32 55, 32 65, 42 75 Z" fill="url(#goldGradient)"/>
    <path d="M 44 55 C 30 45, 30 30, 44 25 C 38 35, 38 45, 44 55 Z" fill="url(#goldGradient)"/>

    <!-- Right Rice Grains -->
    <path d="M 58 75 C 75 65, 80 50, 62 45 C 68 55, 68 65, 58 75 Z" fill="url(#goldGradient)"/>
    <path d="M 56 55 C 70 45, 70 30, 56 25 C 62 35, 62 45, 56 55 Z" fill="url(#goldGradient)"/>

    <!-- Center Long Grain / Stalk -->
    <path d="M 50 15 C 45 35, 45 75, 50 100 C 55 75, 55 35, 50 15 Z" fill="url(#goldGradient)"/>
  </g>

  <!-- Typography -->
  <!-- "SAQIB" Logo Text -->
  <text x="130" y="80" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="52" 
        font-weight="bold" 
        fill="url(#goldGradient)" 
        letter-spacing="5"
        filter="url(#dropShadow)">
    SAQIB
  </text>

  <!-- "RICE MILLS" Logo Text -->
  <text x="133" y="115" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="600" 
        fill="#006400" 
        letter-spacing="12">
    RICE MILLS
  </text>
</svg>
